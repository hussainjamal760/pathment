name: Deploy staging backend

# Redeploys droplet #2 whenever the staging branch moves.
# Runs only on direct pushes to `staging` (collaborators) — NOT on fork PRs,
# so the SSH secret is never exposed to untrusted code.
on:
  push:
    branches: [staging]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-staging.yml'

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /root/pathment
            git fetch origin staging
            git checkout staging
            git reset --hard origin/staging
            cd server
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
            # Sync schema from models (safe/idempotent on the staging DB).
            docker compose -f docker-compose.yml -f docker-compose.staging.yml run --rm api npm run db:sync
            docker compose -f docker-compose.yml -f docker-compose.staging.yml ps
