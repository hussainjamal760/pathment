# Pathment backend — API (Express + Socket.IO + in-process email worker) behind Caddy (auto-HTTPS).
# Postgres stays on DigitalOcean (managed) — NOT in this compose.
#
#   cp .env.example .env   # then fill it in (see DEPLOY.md), incl. API_DOMAIN=api.yourdomain.com
#   docker compose up -d --build
#
services:
  api:
    build: .
    image: pathment-api:latest
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "5000"
    expose:
      - "5000"            # internal only — reached by Caddy, never published to the host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    networks: [web]

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}     # e.g. api.yourdomain.com — Caddy issues a Let's Encrypt cert for this
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data            # persists certificates across restarts
      - caddy_config:/config
    restart: unless-stopped
    networks: [web]

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
